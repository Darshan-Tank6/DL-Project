version: "3.9"

services:
  scenic-vibe:
    build:
      context: .
      dockerfile: Dockerfile
    image: scenic-vibe-detector:latest
    container_name: scenic_vibe_app
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=10   # MB
    volumes:
      # Optional: mount models folder from host so you can swap models
      # without rebuilding the image. Comment out if you prefer baking
      # models into the image (default Dockerfile behaviour).
      # - ./models:/app/models:ro
      - streamlit_cache:/home/appuser/.streamlit

volumes:
  streamlit_cache:
